name: Release & Deploy

on:
  # Manuel tetikleme (tercih edilen yontem)
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Versiyon tipi'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      skip_build:
        description: 'Build atla (sadece release olustur)'
        required: false
        default: false
        type: boolean
      skip_ios:
        description: 'iOS build atla'
        required: false
        default: true
        type: boolean
  # Tag push'unda tetikleme (v* formatinda)
  push:
    tags:
      - 'v*.*.*'

# Ayni anda sadece bir release workflow'u calissin
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Versiyon ve Release Hazirligi
  # ============================================
  prepare:
    name: 📋 Release Hazirligi
    runs-on: ubuntu-latest
    # Tag push'unda bu job'i atla (zaten versiyon belli)
    if: github.event_name == 'workflow_dispatch'

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔧 Kod kontrolleri
        run: |
          npm run typecheck || true  # React 19 tip uyumsuzlugu gecici
          npm run lint
          npm test

      - name: 🔢 Versiyon hesapla
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Mevcut versiyon: $CURRENT_VERSION"

          VERSION_TYPE="${{ github.event.inputs.version_type }}"
          echo "Versiyon tipi: $VERSION_TYPE"

          # Yeni versiyonu hesapla
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}

          case $VERSION_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          TAG="v$NEW_VERSION"

          echo "Yeni versiyon: $NEW_VERSION"
          echo "Tag: $TAG"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: 📝 Package.json guncelle
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: 📝 App.json versiyonunu senkronize et
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          # app.json icindeki versiyonu guncelle
          node -e "
            const fs = require('fs');
            const appJson = JSON.parse(fs.readFileSync('./app.json', 'utf8'));
            appJson.expo.version = '$NEW_VERSION';
            fs.writeFileSync('./app.json', JSON.stringify(appJson, null, 2) + '\n');
            console.log('app.json versiyonu guncellendi: $NEW_VERSION');
          "

      - name: 📝 Sabitler dosyasini guncelle
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          # UygulamaSabitleri.ts icindeki versiyonu guncelle
          # Windows/Linux uyumlu olmasi icin node kullaniyoruz (sed yerine)
          node -e "
            const fs = require('fs');
            const newVersion = '$NEW_VERSION';
            const path = './src/core/constants/UygulamaSabitleri.ts';
            let content = fs.readFileSync(path, 'utf8');
            content = content.replace(/VERSIYON: '[0-9]+\.[0-9]+\.[0-9]+'/, 'VERSIYON: \\'' + newVersion + '\\'');
            fs.writeFileSync(path, content);
            console.log('UygulamaSabitleri.ts versiyonu guncellendi: ' + newVersion);
          "

      - name: 📤 Commit ve tag olustur
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json app.json src/core/constants/UygulamaSabitleri.ts
          git commit -m "chore(release): ${{ steps.version.outputs.version }} [skip ci]"
          git tag -a ${{ steps.version.outputs.tag }} -m "Release ${{ steps.version.outputs.tag }}"
          git push origin master
          git push origin ${{ steps.version.outputs.tag }}

  # ============================================
  # GitHub Release Olustur
  # ============================================
  release:
    name: 🚀 GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare]
    if: always() && (needs.prepare.result == 'success' || github.event_name == 'push')

    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.tag || github.ref }}

      - name: 🔢 Versiyon bilgisini al
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          else
            TAG="${{ needs.prepare.outputs.tag }}"
            VERSION="${{ needs.prepare.outputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: 📝 Changelog olustur
        id: changelog
        run: |
          # Tum tagleri al ve son iki tanesini bul
          ALL_TAGS=$(git tag --sort=-version:refname | head -5)
          CURRENT_TAG="${{ needs.prepare.outputs.tag || github.ref_name }}"
          
          # Onceki tag'i bul (current tag haricindeki ilk tag)
          LAST_TAG=""
          for tag in $ALL_TAGS; do
            if [ "$tag" != "$CURRENT_TAG" ]; then
              LAST_TAG="$tag"
              break
            fi
          done
          
          echo "Current tag: $CURRENT_TAG"
          echo "Previous tag: $LAST_TAG"
          
          if [ -z "$LAST_TAG" ]; then
            echo "first_release=true" >> $GITHUB_OUTPUT
            echo "commit_count=0" >> $GITHUB_OUTPUT
            echo "previous_tag=" >> $GITHUB_OUTPUT
          else
            echo "first_release=false" >> $GITHUB_OUTPUT
            echo "previous_tag=$LAST_TAG" >> $GITHUB_OUTPUT
            
            # Commit sayisi
            COMMIT_COUNT=$(git rev-list ${LAST_TAG}..HEAD --count 2>/dev/null || echo "0")
            echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
            
            # Kategorize edilmis degisiklikler (commit hash'siz daha temiz gorunum)
            FEATURES=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --grep="^feat" 2>/dev/null | sed 's/^feat[:(]*//' | sed 's/):/: /' | head -15)
            FIXES=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --grep="^fix" 2>/dev/null | sed 's/^fix[:(]*//' | sed 's/):/: /' | head -15)
            PERF=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --grep="^perf" 2>/dev/null | sed 's/^perf[:(]*//' | sed 's/):/: /' | head -10)
            REFACTOR=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --grep="^refactor" 2>/dev/null | sed 's/^refactor[:(]*//' | sed 's/):/: /' | head -10)
            DOCS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --grep="^docs" 2>/dev/null | sed 's/^docs[:(]*//' | sed 's/):/: /' | head -5)
            
            # Multi-line outputs
            {
              echo "features<<FEATURES_EOF"
              echo "$FEATURES"
              echo "FEATURES_EOF"
            } >> $GITHUB_OUTPUT
            
            {
              echo "fixes<<FIXES_EOF"
              echo "$FIXES"
              echo "FIXES_EOF"
            } >> $GITHUB_OUTPUT
            
            {
              echo "perf<<PERF_EOF"
              echo "$PERF"
              echo "PERF_EOF"
            } >> $GITHUB_OUTPUT
            
            {
              echo "refactor<<REFACTOR_EOF"
              echo "$REFACTOR"
              echo "REFACTOR_EOF"
            } >> $GITHUB_OUTPUT
            
            {
              echo "docs<<DOCS_EOF"
              echo "$DOCS"
              echo "DOCS_EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: 🚀 GitHub Release olustur
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: "v${{ steps.get_version.outputs.version }}"
          body: |
            ${{ steps.changelog.outputs.first_release == 'true' && '🎉 **Ilk release!**' || format('📊 **{0}** commit | Onceki: [{1}](https://github.com/{2}/releases/tag/{1})', steps.changelog.outputs.commit_count, steps.changelog.outputs.previous_tag, github.repository) }}

            ${{ steps.changelog.outputs.features && steps.changelog.outputs.features != '' && format('### ✨ Yeni Ozellikler
            {0}
            ', steps.changelog.outputs.features) || '' }}${{ steps.changelog.outputs.fixes && steps.changelog.outputs.fixes != '' && format('### 🐛 Hata Duzeltmeleri
            {0}
            ', steps.changelog.outputs.fixes) || '' }}${{ steps.changelog.outputs.perf && steps.changelog.outputs.perf != '' && format('### ⚡ Performans
            {0}
            ', steps.changelog.outputs.perf) || '' }}${{ steps.changelog.outputs.refactor && steps.changelog.outputs.refactor != '' && format('### ♻️ Refactoring
            {0}
            ', steps.changelog.outputs.refactor) || '' }}${{ steps.changelog.outputs.docs && steps.changelog.outputs.docs != '' && format('### 📚 Dokumantasyon
            {0}
            ', steps.changelog.outputs.docs) || '' }}
            ---
            ${{ steps.changelog.outputs.previous_tag != '' && format('**Full Changelog**: https://github.com/{0}/compare/{1}...{2}', github.repository, steps.changelog.outputs.previous_tag, steps.get_version.outputs.tag) || '' }}
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Android Production Build
  # ============================================
  build-android:
    name: 🤖 Android Build
    runs-on: ubuntu-latest
    needs: [release]
    if: ${{ github.event.inputs.skip_build != 'true' }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🚀 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🏗️ Build Android APK
        id: build
        continue-on-error: true
        run: |
          echo "🚀 EAS Build baslatiliyor..."
          eas build --platform android --profile production --non-interactive --no-wait
          echo "✅ Build basladi. EAS Dashboard'dan takip edin: https://expo.dev"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # ============================================
  # iOS Production Build (Opsiyonel)
  # ============================================
  build-ios:
    name: 🍎 iOS Build
    runs-on: ubuntu-latest
    needs: [release]
    if: ${{ github.event.inputs.skip_build != 'true' && github.event.inputs.skip_ios != 'true' }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🚀 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🏗️ Build iOS
        run: |
          eas build --platform ios --profile production --non-interactive --no-wait || echo "iOS build baslatilamadi - Apple Developer hesabi gerekli olabilir"
        continue-on-error: true
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
