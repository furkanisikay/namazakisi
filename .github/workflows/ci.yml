# ========================================================================
# CI Pipeline — Namaz Akisi
# ========================================================================
#
# Tetikleyiciler:
#   - master / develop branch'lerine push
#   - master / develop branch'lerine PR
#
# Pipeline:
#   quality (lint + typecheck)  ──┐
#   test    (jest + coverage)   ──┼── ci-summary ── auto-release (sadece master push)
#                                 │
# ========================================================================

name: CI

on:
  push:
    branches: [master, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'
  pull_request:
    branches: [master, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read  # PR/test job'ları için salt okunur yeterli; yazma izni sadece auto-release job'unda

env:
  NODE_VERSION: '20'

jobs:
  # =============================================
  # Kod Kalitesi Kontrolleri
  # =============================================
  quality:
    name: 🔍 Kod Kalitesi
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📌 npm sürümünü sabitle (deterministik lock)
        run: npm install -g npm@10.9.8

      - name: 💾 Cache node_modules
        id: cache-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: 📚 Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: 🔧 TypeScript
        id: typecheck
        run: npm run typecheck

      - name: 🧹 ESLint
        id: lint
        run: npm run lint

      - name: 📊 Kalite Ozeti
        if: always()
        run: |
          {
            echo "### 🔍 Kod Kalitesi"
            echo ""
            echo "| Kontrol | Durum |"
            echo "|---------|-------|"
            echo "| TypeScript | ${{ steps.typecheck.outcome == 'success' && '✅ Basarili' || '❌ Basarisiz' }} |"
            echo "| ESLint | ${{ steps.lint.outcome == 'success' && '✅ Basarili' || '❌ Basarisiz' }} |"
          } >> $GITHUB_STEP_SUMMARY

  # =============================================
  # Unit Testler
  # =============================================
  test:
    name: 🧪 Testler
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📌 npm sürümünü sabitle (deterministik lock)
        run: npm install -g npm@10.9.8

      - name: 💾 Cache node_modules
        id: cache-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: 📚 Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: 🧪 Testleri calistir
        id: tests
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov

      - name: 📊 Coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: 📊 Test Ozeti
        if: always()
        run: |
          {
            echo "### 🧪 Testler"
            echo ""
            echo "| Kontrol | Durum |"
            echo "|---------|-------|"
            echo "| Unit Tests | ${{ steps.tests.outcome == 'success' && '✅ Basarili' || '❌ Basarisiz' }} |"
            echo ""
            if [ -f coverage/coverage-summary.json ]; then
              echo "#### 📊 Coverage (eşik: S50 / B35 / F40 / L50)"
              echo ""
              echo "| Metrik | % | Kapsam |"
              echo "|--------|---|--------|"
              node -e 'const t=require("./coverage/coverage-summary.json").total; const ad={lines:"Lines",statements:"Statements",functions:"Functions",branches:"Branches"}; for(const k of ["lines","statements","functions","branches"]) console.log(`| ${ad[k]} | ${t[k].pct}% | ${t[k].covered}/${t[k].total} |`);' >> $GITHUB_STEP_SUMMARY
            elif [ -f coverage/lcov.info ]; then
              echo "> 📊 Coverage raporu artifact olarak yuklendi."
            fi
          } >> $GITHUB_STEP_SUMMARY

  # =============================================
  # Pipeline Ozeti
  # =============================================
  ci-summary:
    name: 📊 Pipeline Ozeti
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: always()
    timeout-minutes: 2

    steps:
      - name: 📊 Ozet Raporu
        run: |
          {
            echo "## 📊 CI Pipeline Sonuclari"
            echo ""
            echo "| Job | Durum |"
            echo "|-----|-------|"
            echo "| 🔍 Kod Kalitesi | ${{ needs.quality.result == 'success' && '✅ Basarili' || '❌ Basarisiz' }} |"
            echo "| 🧪 Testler | ${{ needs.test.result == 'success' && '✅ Basarili' || '❌ Basarisiz' }} |"
            echo ""
            echo "---"
            echo ""
            echo "| Bilgi | Deger |"
            echo "|-------|-------|"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "| **Commit** | [\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |"
            echo "| **Tetikleyen** | @${{ github.actor }} |"
            echo "| **Olay** | \`${{ github.event_name }}\` |"
          } >> $GITHUB_STEP_SUMMARY
          
          # Tum sonuclari degerlendir
          if [ "${{ needs.quality.result }}" == "success" ] && [ "${{ needs.test.result }}" == "success" ]; then
            {
              echo ""
              echo "### ✅ Tum kontroller basarili!"
              if [ "${{ github.ref }}" == "refs/heads/master" ] && [ "${{ github.event_name }}" == "push" ]; then
                echo ""
                echo "> 🚀 **Release build otomatik olarak tetikleniyor...**"
              fi
            } >> $GITHUB_STEP_SUMMARY
          else
            {
              echo ""
              echo "### ❌ Pipeline basarisiz!"
              echo "> Release build tetiklenmeyecek."
            } >> $GITHUB_STEP_SUMMARY
          fi

      - name: ❌ Basarisiz sonuc
        if: needs.quality.result != 'success' || needs.test.result != 'success'
        run: exit 1

  # =============================================
  # Otomatik Release (master push + CI basarili)
  # =============================================
  auto-release:
    name: 🚀 Otomatik Release
    needs: [quality, test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    # Reusable workflow'un izinleri, caller job'un izinlerinin alt kümesi olmak
    # zorunda. android-build.yml actions:write istediğinden burada da vermeliyiz;
    # aksi halde workflow startup_failure ile reddedilir.
    permissions:
      contents: write
      actions: write
    uses: ./.github/workflows/android-build.yml
    with:
      build_type: 'release'
    secrets: inherit
